# Local PostgreSQL for development (spec 002). DSN example:
#   postgres://jobhound:jobhound@localhost:5432/jobhound?sslmode=disable
# See specs/002-postgres-gorm-migrations/contracts/environment.md
#
# Temporal (spec 003): separate Postgres for Temporal persistence, server, Web UI.
# gRPC frontend on host: localhost:7233 — set JOBHOUND_TEMPORAL_ADDRESS=localhost:7233
# Web UI on host: http://localhost:8088 — see README and specs/003 contracts.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jobhound
      POSTGRES_PASSWORD: jobhound
      POSTGRES_DB: jobhound
    ports:
      - "5432:5432"
    volumes:
      - jobhound_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhound -d jobhound"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  temporal-postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  temporal:
    image: temporalio/auto-setup:1.29.1
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      - "7233:7233"
    volumes:
      - ./docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"

volumes:
  jobhound_pgdata:
  temporal_pgdata:
